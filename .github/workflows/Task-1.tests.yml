name: Run Tests for Task1-UITest

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    
    - name: Setup Java 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    
    - name: Verify Java installation
      run: java -version
    
    - name: Verify Maven installation
      run: mvn --version
    
    - name: Install Chrome browser
      uses: browser-actions/setup-chrome@latest
    
    - name: Verify Chrome installation
      run: which google-chrome
    
    - name: Build project with Maven
      run: cd Task1-UITest && mvn clean install -DskipTests
    
    - name: Run Selenium tests
      run: cd Task1-UITest && mvn test -Dbrowser=chrome -Dheadless=true
      env:
        BROWSER: ${{ matrix.browser }}
    
    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: Task1-UITest/target/surefire-reports/
        retention-days: 30
    
    - name: Upload failure screenshots
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: failure-screenshots
        path: Task1-UITest/failures_screenshots/
        retention-days: 30
    
    - name: Notify on test success
      if: success()
      run: echo "✅ All tests passed successfully!"